<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Escolha</title>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getDatabase, ref, set, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

    // ============================================================
    //  🔧 CONFIGURAÇÃO — substitua pelos seus dados do Firebase
    // ============================================================
    const firebaseConfig = {
      apiKey:            "SUA_API_KEY",
      authDomain:        "SEU_PROJETO.firebaseapp.com",
      databaseURL:       "https://SEU_PROJETO-default-rtdb.firebaseio.com",
      projectId:         "SEU_PROJETO",
      storageBucket:     "SEU_PROJETO.appspot.com",
      messagingSenderId: "SEU_SENDER_ID",
      appId:             "SEU_APP_ID"
    };
    // ============================================================

    const app = initializeApp(firebaseConfig);
    const db  = getDatabase(app);

    const params     = new URLSearchParams(location.search);
    const isReceptor = params.get("modo") === "receptor";

    document.addEventListener("DOMContentLoaded", () => {
      if (isReceptor) initReceptor();
      else            initEspectador();
    });

    // ════════════════════════════════════════════════════════════
    //  RECEPTOR
    // ════════════════════════════════════════════════════════════
    function initReceptor() {
      document.getElementById("app-espectador").style.display = "none";
      document.getElementById("app-receptor").style.display   = "flex";

      let tsValor = null;
      let tsNaipe = null;

      onValue(ref(db, "thumper/valor"), (snap) => {
        const d = snap.val();
        if (!d || d.ts === tsValor) return;
        tsValor = d.ts;
        vibrarN(d.valor);
      });

      onValue(ref(db, "thumper/naipe"), (snap) => {
        const d = snap.val();
        if (!d || d.ts === tsNaipe) return;
        tsNaipe = d.ts;
        vibrarN(d.valor);
      });
    }

    function vibrarN(n, onDone) {
      if (!n || n < 1 || n > 20) return;
      const pulso  = 380;
      const pausa  = 230;
      const padrao = [];
      for (let i = 0; i < n; i++) {
        padrao.push(pulso);
        if (i < n - 1) padrao.push(pausa);
      }
      navigator.vibrate && navigator.vibrate(padrao);
      if (onDone) {
        const total = pulso * n + pausa * (n - 1);
        setTimeout(onDone, total);
      }

      // Mostra contagem na tela do receptor
      const pulsoEl = document.getElementById("pulso-receptor");
      if (pulsoEl) {
        document.getElementById("contagem").textContent = n;
        pulsoEl.style.display = "flex";
        const total = pulso * n + pausa * (n - 1);
        setTimeout(() => { pulsoEl.style.display = "none"; }, total + 600);
      }
    }

    // ════════════════════════════════════════════════════════════
    //  ESPECTADOR
    // ════════════════════════════════════════════════════════════
    const VALORES = [
      { label: "Ás",     valor: 1,  emoji: "A"  },
      { label: "2",      valor: 2,  emoji: "2"  },
      { label: "3",      valor: 3,  emoji: "3"  },
      { label: "4",      valor: 4,  emoji: "4"  },
      { label: "5",      valor: 5,  emoji: "5"  },
      { label: "6",      valor: 6,  emoji: "6"  },
      { label: "7",      valor: 7,  emoji: "7"  },
      { label: "8",      valor: 8,  emoji: "8"  },
      { label: "9",      valor: 9,  emoji: "9"  },
      { label: "10",     valor: 10, emoji: "10" },
      { label: "Valete", valor: 11, emoji: "J"  },
      { label: "Dama",   valor: 12, emoji: "Q"  },
      { label: "Rei",    valor: 13, emoji: "K"  },
    ];

    const NAIPES = [
      { label: "Paus",    valor: 1, emoji: "♣", vermelho: false },
      { label: "Espadas", valor: 2, emoji: "♠", vermelho: false },
      { label: "Copas",   valor: 3, emoji: "♥", vermelho: true  },
      { label: "Ouros",   valor: 4, emoji: "♦", vermelho: true  },
    ];

    const OUTRAS = {
      dado: {
        label: "Dado", emoji: "🎲",
        itens: [
          { label: "1", valor: 1, emoji: "⚀" },
          { label: "2", valor: 2, emoji: "⚁" },
          { label: "3", valor: 3, emoji: "⚂" },
          { label: "4", valor: 4, emoji: "⚃" },
          { label: "5", valor: 5, emoji: "⚄" },
          { label: "6", valor: 6, emoji: "⚅" },
        ]
      },
      numero: {
        label: "Número", emoji: "🔢",
        itens: Array.from({ length: 10 }, (_, i) => ({
          label: String(i+1), valor: i+1, emoji: String(i+1)
        }))
      }
    };

    // Estado da escolha de baralho
    let etapa = "valor"; // "valor" ou "naipe"

    function initEspectador() {
      renderTabs();
    }

    function renderTabs() {
      const tabs = document.getElementById("tabs");
      tabs.innerHTML = "";

      // Baralho
      const btnBaralho = criarTab("🃏", "Baralho", true);
      btnBaralho.addEventListener("click", () => {
        ativarTab(btnBaralho);
        renderBaralho();
      });
      tabs.appendChild(btnBaralho);

      // Dado + Número
      Object.entries(OUTRAS).forEach(([key, cat]) => {
        const btn = criarTab(cat.emoji, cat.label, false);
        btn.addEventListener("click", () => {
          ativarTab(btn);
          renderSimples(cat.itens, "sinal");
        });
        tabs.appendChild(btn);
      });

      // Renderiza baralho por padrão
      renderBaralho();
    }

    function criarTab(emoji, label, ativo) {
      const btn = document.createElement("button");
      btn.className = "tab" + (ativo ? " ativo" : "");
      btn.innerHTML = `<span class="tab-emoji">${emoji}</span><span>${label}</span>`;
      return btn;
    }

    function ativarTab(btn) {
      document.querySelectorAll(".tab").forEach(t => t.classList.remove("ativo"));
      btn.classList.add("ativo");
      // Resetar etapa ao trocar de aba
      etapa = "valor";
    }

    // ── Baralho: fluxo em duas etapas ───────────────────────────
    function renderBaralho() {
      etapa = "valor";
      const conteudo = document.getElementById("conteudo");
      conteudo.innerHTML = "";

      const titulo = document.createElement("p");
      titulo.className = "etapa-titulo";
      titulo.id = "etapa-titulo";
      titulo.textContent = "Qual é o valor da carta?";
      conteudo.appendChild(titulo);

      const grid = document.createElement("div");
      grid.className = "grid";
      grid.id = "grid-principal";

      VALORES.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "item-btn";
        btn.innerHTML = `<span class="item-emoji">${item.emoji}</span><span class="item-label">${item.label}</span>`;
        btn.addEventListener("click", () => escolherValor(item));
        grid.appendChild(btn);
      });

      conteudo.appendChild(grid);
    }

    function escolherValor(item) {
      // Destaca visualmente (seleção), sem texto suspeito
      document.querySelectorAll("#grid-principal .item-btn").forEach(b => b.classList.remove("selecionado"));
      event.currentTarget.classList.add("selecionado");

      // Envia pro Firebase silenciosamente
      set(ref(db, "thumper/valor"), { valor: item.valor, ts: Date.now() });

      // Após breve pausa, avança para etapa do naipe
      setTimeout(() => mostrarNaipe(item), 600);
    }

    function mostrarNaipe(valorEscolhido) {
      etapa = "naipe";
      const conteudo = document.getElementById("conteudo");
      conteudo.innerHTML = "";

      const titulo = document.createElement("p");
      titulo.className = "etapa-titulo";
      titulo.textContent = "Qual é o naipe?";
      conteudo.appendChild(titulo);

      const grid = document.createElement("div");
      grid.className = "grid grid-naipe";

      NAIPES.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "item-btn" + (item.vermelho ? " vermelho" : "");
        btn.innerHTML = `<span class="item-emoji">${item.emoji}</span><span class="item-label">${item.label}</span>`;
        btn.addEventListener("click", (e) => escolherNaipe(item, e.currentTarget));
        grid.appendChild(btn);
      });

      conteudo.appendChild(grid);

      // Botão discreto para voltar
      const voltar = document.createElement("button");
      voltar.className = "btn-voltar";
      voltar.textContent = "← Voltar";
      voltar.addEventListener("click", renderBaralho);
      conteudo.appendChild(voltar);
    }

    function escolherNaipe(item, btnEl) {
      document.querySelectorAll(".grid-naipe .item-btn").forEach(b => b.classList.remove("selecionado"));
      btnEl.classList.add("selecionado");

      set(ref(db, "thumper/naipe"), { valor: item.valor, ts: Date.now() });

      // Após confirmação visual, volta ao início discretamente
      setTimeout(renderBaralho, 1200);
    }

    // ── Categorias simples (dado, número) ───────────────────────
    function renderSimples(itens, canal) {
      const conteudo = document.getElementById("conteudo");
      conteudo.innerHTML = "";

      const titulo = document.createElement("p");
      titulo.className = "etapa-titulo";
      titulo.textContent = "Faça sua escolha";
      conteudo.appendChild(titulo);

      const grid = document.createElement("div");
      grid.className = "grid";

      itens.forEach(item => {
        const btn = document.createElement("button");
        btn.className = "item-btn";
        btn.innerHTML = `<span class="item-emoji">${item.emoji}</span><span class="item-label">${item.label}</span>`;
        btn.addEventListener("click", (e) => {
          document.querySelectorAll(".grid .item-btn").forEach(b => b.classList.remove("selecionado"));
          e.currentTarget.classList.add("selecionado");
          set(ref(db, "thumper/sinal"), { valor: item.valor, ts: Date.now() });
          setTimeout(() => {
            document.querySelectorAll(".grid .item-btn").forEach(b => b.classList.remove("selecionado"));
          }, 1200);
        });
        grid.appendChild(btn);
      });

      conteudo.appendChild(grid);
    }
  </script>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0c0c12;
      --surface: #14141e;
      --border:  #1f1f30;
      --accent:  #6d28d9;
      --accent2: #a78bfa;
      --pulse:   #c4b5fd;
      --text:    #ede8ff;
      --muted:   #6b6585;
      --ok:      #34d399;
      --r:       14px;
      --font:    'Inter', system-ui, sans-serif;
    }

    html, body {
      min-height: 100dvh;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      -webkit-font-smoothing: antialiased;
    }

    /* ── ESPECTADOR ─────────────────────────────────────────── */
    #app-espectador {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 32px 16px 48px;
      gap: 22px;
      max-width: 520px;
      margin: 0 auto;
    }

    header { text-align: center; }

    h1 {
      font-size: clamp(26px, 6vw, 36px);
      font-weight: 700;
      letter-spacing: -.025em;
    }

    .sub {
      margin-top: 6px;
      font-size: 15px;
      color: var(--muted);
    }

    /* Tabs */
    #tabs {
      display: flex;
      gap: 8px;
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 6px;
    }

    .tab {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 500;
      padding: 10px 4px;
      border-radius: 10px;
      cursor: pointer;
      transition: background .18s, color .18s;
      font-family: var(--font);
    }

    .tab-emoji { font-size: 22px; line-height: 1; }
    .tab.ativo { background: var(--accent); color: #fff; }

    /* Conteúdo */
    #conteudo {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .etapa-titulo {
      font-size: 17px;
      font-weight: 600;
      color: var(--text);
      text-align: center;
    }

    /* Grid */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(96px, 1fr));
      gap: 10px;
    }

    .grid-naipe {
      grid-template-columns: repeat(2, 1fr);
      max-width: 340px;
      margin: 0 auto;
      width: 100%;
    }

    .item-btn {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      color: var(--text);
      font-family: var(--font);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 8px 16px;
      gap: 8px;
      cursor: pointer;
      transition: border-color .18s, background .18s, transform .1s;
      -webkit-tap-highlight-color: transparent;
      min-height: 96px;
    }

    .item-btn:active  { transform: scale(.91); }
    .item-btn:hover   { border-color: var(--accent2); background: #1a1030; }
    .item-btn.selecionado { border-color: var(--ok); background: #0b2218; }

    .item-emoji { font-size: 38px; line-height: 1; }
    .item-btn.vermelho .item-emoji { color: #f87171; }

    /* Naipes maiores */
    .grid-naipe .item-btn { min-height: 120px; padding: 24px 12px 18px; }
    .grid-naipe .item-emoji { font-size: 52px; }

    .item-label {
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
    }

    .btn-voltar {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 13px;
      font-family: var(--font);
      cursor: pointer;
      padding: 4px 0;
      text-align: center;
    }

    /* ── RECEPTOR ───────────────────────────────────────────── */
    #app-receptor {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100dvh;
      gap: 28px;
    }

    .orb {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      background: radial-gradient(circle at 38% 32%, var(--accent2), var(--accent) 60%, #2e1065);
      box-shadow: 0 0 48px 10px rgba(109,40,217,.4);
      animation: breathe 3.2s ease-in-out infinite;
    }

    @keyframes breathe {
      0%,100% { transform: scale(1);    box-shadow: 0 0 48px 10px rgba(109,40,217,.4); }
      50%      { transform: scale(1.08); box-shadow: 0 0 72px 20px rgba(109,40,217,.55); }
    }

    .orb-label {
      font-size: 12px;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    #pulso-receptor {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(109,40,217,.07);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      animation: flash .3s ease-out;
      z-index: 10;
      pointer-events: none;
    }

    @keyframes flash {
      0%   { background: rgba(109,40,217,.3); }
      100% { background: rgba(109,40,217,.05); }
    }

    #contagem {
      font-size: 120px;
      font-weight: 700;
      letter-spacing: -.04em;
      color: var(--pulse);
      line-height: 1;
      text-shadow: 0 0 50px var(--accent2);
    }

    .pulso-label {
      font-size: 15px;
      color: var(--muted);
      letter-spacing: .1em;
      text-transform: uppercase;
    }
  </style>
</head>
<body>

  <!-- ESPECTADOR -->
  <div id="app-espectador">
    <header>
      <h1>Faça sua escolha</h1>
      <p class="sub">Toque no item desejado</p>
    </header>
    <div id="tabs"></div>
    <div id="conteudo"></div>
  </div>

  <!-- RECEPTOR -->
  <div id="app-receptor">
    <div class="orb"></div>
    <p class="orb-label">Aguardando</p>
    <div id="pulso-receptor">
      <div id="contagem">–</div>
      <p class="pulso-label">pulsos</p>
    </div>
  </div>

</body>
</html>
